{% extends "base.html" %}
{% block title %}Tokens — MediaCat{% endblock %}

{% block content %}
<h1>Token registry</h1>

<form class="search-bar" hx-get="/tokens" hx-target="#token-table" hx-push-url="true">
    <input type="search" name="q" value="{{ query }}" placeholder="Search title, artist, barcode…">
    <select name="media">
        <option value="">All formats</option>
        <option value="vinyl" {% if media_filter == 'vinyl' %}selected{% endif %}>Vinyl</option>
        <option value="cd" {% if media_filter == 'cd' %}selected{% endif %}>CD</option>
    </select>
    <button type="submit">Search</button>
</form>

<div id="token-table">
    {% include "partials/token_list.html" %}
</div>
{% endblock %}
