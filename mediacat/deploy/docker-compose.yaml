# docker-compose.yaml — MediaCat full stack.
#
# Data volumes are bind-mounted from ${MEDIACAT_DATA_ROOT} (host).
# Secrets are read from ${MEDIACAT_DATA_ROOT}/secrets/.
# Code upgrades = rebuild image + restart; data is untouched.

name: mediacat

# ---------- Secrets (files on host, mounted read-only) ---------------------
secrets:
  postgres_password:
    file: ${MEDIACAT_DATA_ROOT:-/srv/mediacat}/secrets/postgres_password
  postgres_app_password:
    file: ${MEDIACAT_DATA_ROOT:-/srv/mediacat}/secrets/postgres_app_password
  minio_root_password:
    file: ${MEDIACAT_DATA_ROOT:-/srv/mediacat}/secrets/minio_root_password
  redis_password:
    file: ${MEDIACAT_DATA_ROOT:-/srv/mediacat}/secrets/redis_password

# ---------- Networks -------------------------------------------------------
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true           # no outbound internet from the data plane

# ---------- Services -------------------------------------------------------
services:

  # ---- Reverse proxy (Caddy) ----
  caddy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    restart: unless-stopped
    ports:
      - "${HTTP_BIND:-127.0.0.1:8080}:80"
      - "${HTTPS_BIND:-127.0.0.1:8443}:443"
    environment:
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME:-mediacat.localhost}
      PUBLIC_SCHEME: ${PUBLIC_SCHEME:-https}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data          # TLS certs (named vol is fine; not user data)
      - caddy_config:/config
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    read_only: true
    tmpfs:
      - /tmp

  # ---- PostgreSQL 16 ----
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mediacat}
      POSTGRES_USER: postgres                         # superuser for init only
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      PGDATA: /var/lib/postgresql/data/pgdata         # sub-dir avoids lost+found
    secrets:
      - postgres_password
      - postgres_app_password
    volumes:
      - ${MEDIACAT_DATA_ROOT:-/srv/mediacat}/postgres:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - backend
    ports:
      - "${POSTGRES_BIND:-127.0.0.1:5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: 256m
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, FOWNER, DAC_READ_SEARCH]

  # ---- MinIO (S3-compatible object store) ----
  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2024-12-13T22-19-12Z}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mediacat_admin}
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    secrets:
      - minio_root_password
    volumes:
      - ${MEDIACAT_DATA_ROOT:-/srv/mediacat}/minio:/data
    networks:
      - backend
    ports:
      - "${MINIO_API_BIND:-127.0.0.1:9000}:9000"
      - "${MINIO_CONSOLE_BIND:-127.0.0.1:9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---- Redis (job queue + rate limiter) ----
  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    user: "999:999"
    command: >
      sh -c 'redis-server
      --requirepass "$$(cat /run/secrets/redis_password)"
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --rename-command FLUSHDB ""
      --rename-command FLUSHALL ""
      --rename-command DEBUG ""'
    secrets:
      - redis_password
    volumes:
      - ${MEDIACAT_DATA_ROOT:-/srv/mediacat}/redis:/data
    networks:
      - backend
    ports:
      - "${REDIS_BIND:-127.0.0.1:6379}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$(cat /run/secrets/redis_password)\" ping | grep -c PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    cap_drop: [ALL]
    read_only: true
    tmpfs:
      - /tmp

  # ---- Open Policy Agent ----
  opa:
    image: openpolicyagent/opa:0.69.0-static
    restart: unless-stopped
    command:
      - run
      - --server
      - --addr=:8181
      - --log-level=info
      - --log-format=json
      - /bundles
    volumes:
      - ./opa/bundles:/bundles:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD", "/opa", "version"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    cap_drop: [ALL]
    read_only: true

  # ---- Application (web) ----
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: mediacat:${APP_IMAGE_TAG:-dev}
    restart: unless-stopped
    environment:
      MEDIACAT_ENV: ${MEDIACAT_ENV:-dev}
      MEDIACAT_CONFIG_PATH: /app/config/app.yaml
      MEDIACAT_CONNECTORS_PATH: /app/config/connectors.yaml
      MEDIACAT_DEV_ADMIN_PASSWORD: ${MEDIACAT_DEV_ADMIN_PASSWORD:-}
    secrets:
      - postgres_app_password
      - minio_root_password
      - redis_password
    volumes:
      - ../config/app.yaml:/app/config/app.yaml:ro
      - ../config/connectors.yaml:/app/config/connectors.yaml:ro
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_healthy
    cap_drop: [ALL]
    read_only: true
    tmpfs:
      - /app/tmp
      - /tmp

  # ---- Background worker ----
  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: mediacat:${APP_IMAGE_TAG:-dev}
    restart: unless-stopped
    command:
      - python
      - "-m"
      - mediacat.worker
    environment:
      MEDIACAT_ENV: ${MEDIACAT_ENV:-dev}
      MEDIACAT_CONFIG_PATH: /app/config/app.yaml
      MEDIACAT_CONNECTORS_PATH: /app/config/connectors.yaml
      MEDIACAT_DEV_ADMIN_PASSWORD: ${MEDIACAT_DEV_ADMIN_PASSWORD:-}
    secrets:
      - postgres_app_password
      - minio_root_password
      - redis_password
    volumes:
      - ../config/app.yaml:/app/config/app.yaml:ro
      - ../config/connectors.yaml:/app/config/connectors.yaml:ro
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_healthy
    cap_drop: [ALL]
    read_only: true
    tmpfs:
      - /app/tmp
      - /tmp

  # ---- Backup sidecar (pg_dump + mc mirror, cron schedule) ----
  backup:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache minio-client supercronic 2>/dev/null || true
        echo "0 2 * * * /scripts/backup.sh" > /etc/crontab
        exec supercronic /etc/crontab
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: ${POSTGRES_DB:-mediacat}
      PGUSER: postgres
      PGPASSFILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
      - minio_root_password
    volumes:
      - ${MEDIACAT_DATA_ROOT:-/srv/mediacat}/backups:/backups
      - ./scripts/backup.sh:/scripts/backup.sh:ro
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy

  # ---- Ollama (local LLM / VLM inference) ---------------------------------
  # Activate with:  docker compose --profile ollama up
  # or via:         make ollama-up  (CPU)  /  make ollama-gpu-up  (NVIDIA GPU)
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    restart: unless-stopped
    volumes:
      - ${MEDIACAT_DATA_ROOT:-/srv/mediacat}/ollama:/root/.ollama
    networks:
      - frontend       # needs outbound internet to pull models
      - backend
    ports:
      - "${OLLAMA_BIND:-127.0.0.1:11434}:11434"
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-24h}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-1}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-8192}
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s
    profiles:
      - ollama

  # ---- Open WebUI (browser chat UI for Ollama) -----------------------------
  open-webui:
    image: ${OPEN_WEBUI_IMAGE:-ghcr.io/open-webui/open-webui:main}
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_AUTH: ${WEBUI_AUTH:-true}
    volumes:
      - ${MEDIACAT_DATA_ROOT:-/srv/mediacat}/open-webui:/app/backend/data
    networks:
      - frontend
      - backend
    ports:
      - "${WEBUI_BIND:-127.0.0.1:3000}:8080"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - ollama

  # ---- Ollama model puller (one-shot; runs once after ollama is healthy) ----
  # Pulls OLLAMA_VLM_MODEL (qwen2.5vl:32b, ~21 GB) and OLLAMA_OCR_MODEL
  # (glm-ocr, ~2.2 GB) if not already present.  restart: "no" means it runs
  # once and stops; re-run with:  make ollama-models
  ollama-pull:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    restart: "no"
    entrypoint: ["/bin/sh", "/scripts/ollama-pull.sh"]
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_VLM_MODEL: ${OLLAMA_VLM_MODEL:-qwen2.5vl:32b}
      OLLAMA_OCR_MODEL: ${OLLAMA_OCR_MODEL:-glm-ocr}
    volumes:
      - ./scripts/ollama-pull.sh:/scripts/ollama-pull.sh:ro
    networks:
      - frontend       # needs outbound internet to reach registry.ollama.ai
      - backend
    depends_on:
      ollama:
        condition: service_healthy
    profiles:
      - ollama

# ---------- Named volumes (non-user-data only) -----------------------------
volumes:
  caddy_data:
  caddy_config:
